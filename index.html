<!DOCTYPE html><html lang='id'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Happy Birthday ❤️</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:linear-gradient(135deg,#4b006e,#ff4fa3);display:flex;justify-content:center;align-items:center;height:100vh;color:#fff}
.star,.heart{position:fixed;top:-20px;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh)}}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:30px;border-radius:20px;max-width:700px;text-align:center;box-shadow:0 0 30px #0005}
h1{text-shadow:0 0 10px #fff}
button{padding:12px 20px;border:none;border-radius:20px;background:#ff5ea8;color:#fff;font-size:18px;cursor:pointer}
#msg{display:none;margin-top:20px}
</style></head><body><div class='card'><h1>🎂 Happy Birthday Sayangku ❤️</h1><p>Semoga semua impianmu tercapai dan kita selalu bersama.</p><button onclick="document.getElementById('msg').style.display='block'">💌 Buka Surat Cinta</button><div id='msg'><p>Aku bersyukur memilikimu. Terima kasih telah menjadi bagian terindah dalam hidupku. Selamat ulang tahun, cintaku. I Love You Forever ❤️</p></div></div>
<script>
for(let i=0;i<60;i++){let e=document.createElement('div');e.className=Math.random()>.5?'heart':'star';e.innerHTML=e.className=='heart'?'❤️':'✨';e.style.left=Math.random()*100+'vw';e.style.animationDuration=(5+Math.random()*8)+'s';e.style.fontSize=(12+Math.random()*24)+'px';document.body.appendChild(e);}
</script></body></html>
